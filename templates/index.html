<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; text-align: center; }
        .container { width: 90%; margin: auto; padding: 40px 20px; }
        h1 { font-size: 42px; color: #333; }
        h1 span { color: #4CAF50; }
        .tagline { margin-top: 10px; font-size: 18px; color: #666; }
        .card-container { display: flex; justify-content: center; gap: 40px; margin-top: 60px; flex-wrap: wrap; }
        .card { background: white; padding: 25px 40px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); transition: 0.3s; text-decoration: none; color: #333; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(0,0,0,0.15); }
        .card i { font-size: 40px; margin-bottom: 15px; color: #4CAF50; }
        .card h3 { margin-bottom: 10px; }
        .card p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <h1><span>Expense</span> Tracker 💸</h1>
    <div class="tagline">Track Smart. Spend Wise.</div>
    <div class="card-container">
        <a href="/register" class="card">
            <i class="bi bi-person-plus-fill"></i>
            <h3>New Registration</h3>
            <p>Create your account and start managing your finances today.</p>
        </a>
        <a href="/login" class="card">
            <i class="bi bi-box-arrow-in-right"></i>
            <h3>Login</h3>
            <p>Access your dashboard and monitor your expenses.</p>
        </a>
    </div>
</div>
</body>
</html>
