<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; }
        button:hover { background: #45a049; }
        a { display: block; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Edit Expense</h2>
        <form method="POST">
            <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required>
            <select name="category">
                <option {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                <option {% if expense.category == 'Travel' %}selected{% endif %}>Travel</option>
                <option {% if expense.category == 'Rent' %}selected{% endif %}>Rent</option>
                <option {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                <option {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
                <option {% if expense.category == 'Others' %}selected{% endif %}>Others</option>
            </select>
            <input type="date" name="date" value="{{ expense.date }}" required>
            <input type="text" name="note" value="{{ expense.note }}" placeholder="Note">
            <button type="submit">Update</button>
        </form>
        <a href="/dashboard">Cancel</a>
    </div>
</body>
</html>
