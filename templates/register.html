<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(135deg, #ff758c, #ff7eb3); }
        .card { width:350px; padding:40px; background: rgba(255,255,255,0.15); backdrop-filter:blur(15px); border-radius:20px; box-shadow:0 8px 32px rgba(0,0,0,0.2); text-align:center; color:white; }
        h2 { margin-bottom:20px; font-weight:600; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; outline:none; }
        button { width:100%; padding:12px; border-radius:10px; border:none; margin-top:15px; background:#ffffff; color:#ff4d6d; font-weight:600; cursor:pointer; transition:0.3s; }
        button:hover { transform:translateY(-2px); background:#f1f1f1; }
        .link { margin-top:15px; font-size:14px; }
        .link a { color:#fff; text-decoration:underline; }
        .flashes { list-style: none; padding: 0; }
        .flashes li { background: rgba(255,0,0,0.4); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Create Account ✨</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<ul class="flashes">{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>{% endif %}
    {% endwith %}
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>
    <div class="link">Already have an account? <a href="/login">Login</a></div>
</div>
</body>
</html>
